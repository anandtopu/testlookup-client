# testlookup.properties — generated from Settings → API Keys → Generate streaming key.
# This file MUST live under src/test/resources/ so it lands on the test classpath.
# The Java SDK auto-discovers /testlookup.properties on startup.

testlookup.endpoint=http://testlookup.local
testlookup.api.key=
testlookup.project=GoogleProject
testlookup.launch=Smoke suite
# Release name on the session payload. Maps to reporting.release_name in the
# SDK; blank/unset → server falls back to the project's default release.
testlookup.release=2026.05-smoke

# Optional CI metadata. CI runners typically inject these as JVM system
# properties (-Dtestlookup.build=...) or env vars (TESTLOOKUP_BUILD=...) so
# the file stays the same across builds.
# testlookup.build=42
# testlookup.branch=main
# testlookup.commit=abc1234
