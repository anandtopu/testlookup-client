[pytest]
testpaths = tests
# All tests here are module-level functions; collecting no classes avoids a
# noisy PytestCollectionWarning on the imported TestLookupReporter class.
python_classes =
# These suites stream programmatically via TestLookupReporter().session(), so we
# DISABLE the zero-code auto-plugin here — otherwise it would open a second,
# duplicate live session per pytest run on top of the programmatic ones. (The
# Java realistic project's testng.xml likewise registers NO <listener>.)
addopts = -p no:testlookup
