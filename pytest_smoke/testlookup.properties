# testlookup.properties — generated from Settings → API Keys → Generate streaming key.
# The Python SDK's ConfigLoader auto-discovers ./testlookup.properties from the
# working directory pytest is launched in (run-python-tests.ps1 cd's here first),
# so the testlookup-reporter pytest plugin activates with zero CLI flags.

testlookup.endpoint=http://testlookup.local
testlookup.api.key=qai_ShQgzOyBG7MKfVlvZVulwBbR0-TobYBne7G0Ul9GmkE
testlookup.project=GoogleProject
testlookup.launch=API Regression Multi-Class
# Release name on the session payload. Maps to reporting.release_name in the
# SDK; blank/unset → server falls back to the project's default release.
testlookup.release=2026.05-smoke

# Optional CI metadata. CI runners typically inject these as env vars
# (TESTLOOKUP_BUILD=...) so the file stays the same across builds.
# testlookup.build=42
# testlookup.branch=main
# testlookup.commit=abc1234
